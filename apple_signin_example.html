<!DOCTYPE html>
<html>
<head>
    <title>Apple Sign In Example</title>
    <meta name="appleid-signin-client-id" content="com.yourcompany.wealthsplit">
    <meta name="appleid-signin-scope" content="name email">
    <meta name="appleid-signin-redirect-uri" content="https://yourapp.com/auth/apple/callback">
    <meta name="appleid-signin-state" content="[STATE]">
    <meta name="appleid-signin-use-popup" content="true">
</head>
<body>
    <div id="appleid-signin" data-color="black" data-border="true" data-type="sign in"></div>
    
    <script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>
    <script type="text/javascript">
        AppleID.auth.init({
            clientId: 'com.yourcompany.wealthsplit',
            scope: 'name email',
            redirectURI: 'https://yourapp.com/auth/apple/callback',
            usePopup: true
        });

        // Listen for authorization success
        document.addEventListener('AppleIDSignInOnSuccess', async (event) => {
            const { authorization, user } = event.detail;
            
            try {
                const response = await fetch('/auth/apple', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        identity_token: authorization.id_token,
                        authorization_code: authorization.code,
                        user_info: user // Only available on first sign in
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Store token and redirect
                    localStorage.setItem('access_token', data.data.access_token);
                    window.location.href = '/dashboard';
                } else {
                    console.error('Apple Sign In failed:', data.message);
                }
            } catch (error) {
                console.error('Network error:', error);
            }
        });

        // Listen for authorization failure
        document.addEventListener('AppleIDSignInOnFailure', (event) => {
            console.error('Apple Sign In failed:', event.detail.error);
        });
    </script>
</body>
</html>
